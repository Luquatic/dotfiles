# Put general config stuff here
# Here's a list of every variable: https://wiki.hyprland.org/Configuring/Variables/

# HDMI port: mirror display. To see device name, use `hyprctl monitors`

# main monitor
monitorv2 {
    output = DP-2
    mode = 3840x2160@120
    position = 0x0
    scale = 1.2
    bitdepth = 10
    cm = hdr
    sdrbrightness = 1.5
    sdrsaturation = 1.1
    vrr = 1
}

# left monitor
monitorv2 {
  output = DP-3
  mode = 2560x1440@120
  position = -2560x360
  scale = 1
}

# right monitor
monitorv2 {
  output = DP-1
  mode = 2560x1440@120
  position = 3200x360
  scale = 1
}

workspace=1,monitor:DP-2
workspace=2,monitor:DP-2
workspace=3,monitor:DP-2
workspace=4,monitor:DP-2
workspace=5,monitor:DP-2
workspace=6,monitor:DP-2
workspace=7,monitor:DP-2
workspace=8,monitor:DP-2
workspace=9,monitor:DP-2
workspace=10,monitor:DP-2

workspace=11,monitor:DP-3
workspace=12,monitor:DP-3
workspace=13,monitor:DP-3
workspace=14,monitor:DP-3
workspace=15,monitor:DP-3
workspace=16,monitor:DP-3
workspace=17,monitor:DP-3
workspace=18,monitor:DP-3
workspace=19,monitor:DP-3
workspace=20,monitor:DP-3

workspace=21,monitor:DP-1
workspace=22,monitor:DP-1
workspace=23,monitor:DP-1
workspace=24,monitor:DP-1
workspace=25,monitor:DP-1
workspace=26,monitor:DP-1
workspace=27,monitor:DP-1
workspace=28,monitor:DP-1
workspace=29,monitor:DP-1
workspace=30,monitor:DP-1

# disable scaling for apps outside of desktop
 xwayland {
    force_zero_scaling = true
}

# mouse sensitivity
input {
    sensitivity = -0.5
}
